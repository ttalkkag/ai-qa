################################################################################
# OpenTelemetry(OTEL) - 기본적으로 비활성화
################################################################################
#[otel]
# log에 user prompt text를 포함합니다. 기본값: false
#log_user_prompt = false
# telemetry에 적용할 environment label입니다. 기본값: "dev"
#environment = "dev"
# Exporter: none(기본값) | otlp-http | otlp-grpc
#exporter = "none"
# Trace exporter: none(기본값) | otlp-http | otlp-grpc
#trace_exporter = "none"
# Metrics exporter 값입니다: none | statsig | otlp-http | otlp-grpc
#metrics_exporter = "statsig"
# OTLP/HTTP exporter 설정 예시
#[otel.exporter."otlp-http"]
#endpoint = "https://otel.example.com/v1/logs"
#protocol = "binary" # "binary" | "json"
#[otel.exporter."otlp-http".headers]
#"x-otlp-api-key" = "${OTLP_TOKEN}"
#[otel.exporter."otlp-http".tls]
#ca-certificate = "certs/otel-ca.pem"
#client-certificate = "/etc/codex/certs/client.pem"
#client-private-key = "/etc/codex/certs/client-key.pem"
# OTLP/gRPC trace exporter 설정 예시
